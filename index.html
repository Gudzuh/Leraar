<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#E8590C">
  <meta name="description" content="Leraar: jouw persoonlijke Nederlands-leraar, van A2 naar B2.">
  <title>Leraar</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Leraar</div>
    <div class="streak-chip" id="streakChip" title="Dagen op rij">🔥 <span id="streakDays">0</span></div>
  </header>

  <main id="view" aria-live="polite"></main>

  <nav class="tabbar" id="tabbar">
    <button data-tab="home" class="active"><span class="tab-icon">🏠</span>Vandaag</button>
    <button data-tab="lessons"><span class="tab-icon">📖</span>Lessen</button>
    <button data-tab="progress"><span class="tab-icon">📈</span>Voortgang</button>
    <button data-tab="more"><span class="tab-icon">⚙️</span>Meer</button>
  </nav>

  <script src="js/fsrs.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
